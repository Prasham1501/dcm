<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; background: transparent; -webkit-app-region: drag;
        }
        .splash {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 16px; padding: 48px 40px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            width: 400px;
        }
        .logo {
            width: 64px; height: 64px; margin: 0 auto 16px;
            background: linear-gradient(135deg, #B22222, #8B1A1A);
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: white; font-weight: 700;
        }
        h1 { color: #f1f5f9; font-size: 22px; font-weight: 600; margin-bottom: 4px; }
        p { color: #94a3b8; font-size: 13px; margin-bottom: 24px; }
        .loader {
            width: 200px; height: 3px; background: rgba(255,255,255,0.1);
            border-radius: 2px; margin: 0 auto; overflow: hidden;
        }
        .loader-bar {
            height: 100%; width: 40%; background: linear-gradient(90deg, #B22222, #e94560);
            border-radius: 2px; animation: loading 1.5s ease-in-out infinite;
        }
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }
        .status { color: #64748b; font-size: 11px; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="splash">
        <div class="logo">DV</div>
        <h1>DICOM Viewer Pro</h1>
        <p>Hospital Edition</p>
        <div class="loader"><div class="loader-bar"></div></div>
        <div class="status">Starting services...</div>
    </div>
</body>
</html>
