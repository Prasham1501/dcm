<!-- Environment config (override these per environment) -->
<script>
  const isLocalDashboard = ['localhost', '127.0.0.1', '::1'].includes(window.location.hostname);
  window.MEDIVIEW_API_BASE = isLocalDashboard ? 'http://127.0.0.1:8092' : '/mediview/api'; // hosted path: 'https://mehrgrewal.com/mediview/api'
  window.MEDIVIEW_API_MODE = isLocalDashboard ? (localStorage.getItem('mv:mode') || 'mock') : 'live'; // 'live' | 'mock'

  // Impersonation handoff — when a super-admin opens this tab with ?imp=<token>,
  // adopt that bearer for this tab only and show a banner.
  (function () {
    try {
      var qs = new URLSearchParams(location.search);
      var imp = qs.get('imp');
      if (imp) {
        sessionStorage.setItem('mv:imp', '1');
        localStorage.setItem('mv:token', imp);
        localStorage.removeItem('mv:user'); // force /me re-fetch
        history.replaceState(null, '', location.pathname + location.hash);
        window.addEventListener('DOMContentLoaded', function () {
          var bar = document.createElement('div');
          bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#f59e0b;color:#0f172a;padding:8px 14px;font:600 12px/1.4 system-ui;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.2)';
          bar.innerHTML = '<span>⚠ Impersonating — actions count as this user. Close this tab when done.</span><button id="mv-stop-imp" style="background:#0f172a;color:#fff;border:0;padding:5px 10px;border-radius:4px;font-weight:600;cursor:pointer">Stop &amp; close</button>';
          document.body.appendChild(bar);
          document.body.style.paddingTop = '40px';
          document.getElementById('mv-stop-imp').onclick = function () {
            localStorage.removeItem('mv:token');
            localStorage.removeItem('mv:user');
            window.close();
          };
        });
      }
    } catch (e) { /* ignore */ }
  })();
</script>

<!-- App router -->
<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

// --- Tiny hash router ---
const useHashRoute = () => {
  const [hash, setHash] = useState(window.location.hash || '#/dashboard');
  useEffect(() => {
    const onChange = () => {
      setHash(window.location.hash || '#/dashboard');
      window.scrollTo(0, 0);
    };
    window.addEventListener('hashchange', onChange);
    return () => window.removeEventListener('hashchange', onChange);
  }, []);
  return hash;
};

const ROUTES = {
  '#/dashboard':              () => <PageOverview/>,
  '#/dashboard/devices':      () => <PageDevices/>,
  '#/dashboard/licenses':     () => <PageLicenses/>,
  '#/dashboard/wallet':       () => <PageWallet/>,
  '#/dashboard/ai':           () => <PageAI/>,
  '#/dashboard/invoices':     () => <PageInvoices/>,
  '#/dashboard/tickets':      () => <PageTickets/>,
  '#/dashboard/bugs':         () => <PageBugs/>,
  '#/dashboard/team':         () => <PageTeam/>,
  '#/dashboard/analytics':    () => <PageAnalytics/>,
  '#/dashboard/referrals':    () => <PageReferrals/>,
  '#/dashboard/settings':     () => <PageSettings/>,
  '#/dashboard/admin':        () => (typeof AdminShell !== 'undefined' ? <AdminShell/> : <PageOverview/>),
  '#/dashboard/login':        () => <LoginPage/>,
  '#/dashboard/signup':       () => <SignupPage/>,
  '#/dashboard/forgot':       () => <ForgotPage/>,
  '#/dashboard/reset':        () => <ResetPage/>,
  '#/dashboard/verify-email': () => <VerifyEmailPage/>,
  '#/dashboard/accept-invite':() => <AcceptInvitePage/>,
};

const publicRoutes = [
  '#/dashboard/login',
  '#/dashboard/signup',
  '#/dashboard/forgot',
  '#/dashboard/reset',
  '#/dashboard/verify-email',
  '#/dashboard/accept-invite',
];

const Router = () => {
  const hash    = useHashRoute();
  const { isAuthed, user } = useAuth();
  const route   = hash.split('?')[0];
  // Super-admin lives in the operator console — never the user-side pages.
  // The exception is impersonation: when an admin opens a user's dashboard
  // via the Accounts → Impersonate flow, the bootstrap stores mv:imp=1 in
  // sessionStorage so we let them see the user view *in that tab only*.
  const isSuperAdmin = isAuthed && user?.role === 'super_admin';
  const isImpersonating = typeof sessionStorage !== 'undefined' && sessionStorage.getItem('mv:imp') === '1';
  const adminOnly = isSuperAdmin && !isImpersonating;

  useEffect(() => {
    if (!isAuthed && !publicRoutes.includes(route)) window.location.hash = '#/dashboard/login';
    else if (isAuthed && publicRoutes.includes(route)) {
      window.location.hash = adminOnly ? '#/dashboard/admin' : '#/dashboard';
    } else if (adminOnly && !route.startsWith('#/dashboard/admin')) {
      window.location.hash = '#/dashboard/admin';
    }
  }, [isAuthed, route, adminOnly]);

  if (!isAuthed && !publicRoutes.includes(route)) return null;
  if (isAuthed && publicRoutes.includes(route)) return null;
  if (adminOnly && !route.startsWith('#/dashboard/admin')) return null;

  // '#/dashboard/admin/<section>' is owned by AdminShell which handles its own subnav.
  if (route.startsWith('#/dashboard/admin')) {
    return typeof AdminShell !== 'undefined' ? <AdminShell route={route}/> : <PageOverview/>;
  }

  const Page = ROUTES[route] || ROUTES['#/dashboard'];
  return <Page/>;
};

const App = () => {
  const { isAuthed } = useAuth();
  return (
    <>
      <Router/>
      {isAuthed && typeof ChatWidget !== 'undefined' && <ChatWidget/>}
    </>
  );
};

// Dark-mode init
const applyDark = () => {
  const dark = localStorage.getItem('mv:dark') === '1' || matchMedia('(prefers-color-scheme: dark)').matches;
  document.documentElement.classList.toggle('dark', dark);
};
applyDark();

ReactDOM.createRoot(document.getElementById('root')).render(
  <AuthProvider>
    <ToastProvider>
      <App/>
    </ToastProvider>
  </AuthProvider>
);
</script>
