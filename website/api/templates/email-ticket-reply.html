<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Support — Mediview</title></head>
<body style="margin:0;padding:0;background:#f1f5f9;font-family:Inter,Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f1f5f9;padding:40px 16px;">
<tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;max-width:600px;">

  <tr><td style="background:#DC2626;padding:28px 40px;">
    <h1 style="margin:0;color:#ffffff;font-size:22px;font-weight:700;">Mediview Support</h1>
    <p style="margin:4px 0 0;color:rgba(255,255,255,0.8);font-size:13px;">{{subject}}</p>
  </td></tr>

  <tr><td style="padding:40px;">
    <p style="margin:0 0 8px;color:#64748b;font-size:13px;text-transform:uppercase;letter-spacing:0.08em;">From</p>
    <p style="margin:0 0 24px;color:#0f172a;font-size:15px;font-weight:600;">{{from}}</p>

    <div style="border-left:3px solid #DC2626;padding:16px 20px;background:#fef2f2;border-radius:0 8px 8px 0;margin-bottom:28px;">
      <p style="margin:0;color:#1e293b;font-size:15px;line-height:1.7;white-space:pre-wrap;">{{message}}</p>
    </div>

    {{ticket_url}}
  </td></tr>

  <tr><td style="background:#f8fafc;padding:20px 40px;border-top:1px solid #e2e8f0;">
    <p style="margin:0;color:#94a3b8;font-size:12px;">© 2026 Mediview. All rights reserved.</p>
  </td></tr>

</table>
</td></tr>
</table>
</body>
</html>
